name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        env:
          # Skip the heavy Chromium download — scrapers can't run on Vercel anyway.
          # The custom postinstall script honours both CI=true (default in GH Actions)
          # and this explicit override.
          SKIP_PLAYWRIGHT_INSTALL: 'true'
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        env:
          # Provide harmless placeholders so middleware/supabaseServer don't crash on import.
          # Real keys come from Vercel project env vars at runtime.
          NEXT_PUBLIC_SUPABASE_URL: 'http://placeholder.invalid'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
        run: npm run build
